<!DOCTYPE html>
<html>

<head>
  <title>Fitness Tracker</title>

  <style>
    body {
      background-color: lightpink;
      font-family: Arial;
      padding: 30px;
      color: #333;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 20px;
      max-width: 400px;
    }

    h1 {
      color: #ff6fa5;
    }

    p {
      font-size: 20px;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>Pretty Girl Fitness Tracker</h1>

    <p>Current Weight: 127 lbs</p>
    <p>Goal Weight: 115 lbs</p>
    <p>Protein Goal: 120g</p>
    <p>Calories Goal: 1200</p>
    <p>Steps Goal: 10,000</p>
  </div>
  <p>Weight Loss Progress</p>
  <h2>Daily Checklist</h2>

<input type="checkbox"> Hit protein goal<br>
<input type="checkbox"> Workout completed<br>
<input type="checkbox"> 10k steps<br>
<input type="checkbox"> Drank water<br>
<p>Calories Completed</p>
<progress value="900" max="1200"></progress>

<p>Protein Completed</p>
<progress value="95" max="120"></progress>
<p>Weight Loss Progress</p>
<progress value="12" max="20"></progress>

</div>

</body>

</html>
